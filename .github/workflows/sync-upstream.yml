name: Sync fork with upstream

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Merge upstream tianma-if/edgeever into main
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Merge upstream changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=main
